basePath: /api/v1
definitions:
  securevault-backend_src_models.UserRole:
    enum:
    - user
    - admin
    type: string
    x-enum-varnames:
    - UserRoleUser
    - UserRoleAdmin
  src_api.ActiveUserEntry:
    properties:
      file_count:
        type: integer
      last_upload:
        type: string
      total_downloads:
        type: integer
      user_email:
        type: string
      user_id:
        type: string
    type: object
  src_api.AdminFileEntry:
    properties:
      download_count:
        type: integer
      filename:
        type: string
      id:
        type: string
      is_public:
        type: boolean
      mime_type:
        type: string
      size:
        type: integer
      upload_date:
        type: string
      user_email:
        type: string
      user_id:
        type: string
    type: object
  src_api.AdminFilesResponse:
    properties:
      files:
        items:
          $ref: '#/definitions/src_api.AdminFileEntry'
        type: array
      pagination:
        $ref: '#/definitions/src_api.PaginationInfo'
    type: object
  src_api.AdminStatsResponse:
    properties:
      files_by_type:
        additionalProperties:
          type: integer
        type: object
      most_active_users:
        items:
          $ref: '#/definitions/src_api.ActiveUserEntry'
        type: array
      quota_utilization_percent:
        type: number
      storage_by_user:
        items:
          $ref: '#/definitions/src_api.UserStorageEntry'
        type: array
      total_files:
        type: integer
      total_quota_bytes:
        type: integer
      total_size_bytes:
        type: integer
      total_user_registrations:
        type: integer
      total_users:
        type: integer
      users_by_registration_date:
        items:
          $ref: '#/definitions/src_api.RegistrationEntry'
        type: array
    type: object
  src_api.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/src_api.UserResponseData'
    type: object
  src_api.CreateFolderRequest:
    properties:
      name:
        type: string
      parent_id:
        type: string
    type: object
  src_api.ErrorDetail:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
    type: object
  src_api.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/src_api.ErrorDetail'
    type: object
  src_api.FileListResponse:
    properties:
      files:
        items:
          $ref: '#/definitions/src_api.FileResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  src_api.FileResponse:
    properties:
      created_at:
        type: string
      download_count:
        type: integer
      folder_id:
        type: string
      id:
        type: string
      is_public:
        type: boolean
      mime_type:
        type: string
      original_filename:
        type: string
      share_link:
        $ref: '#/definitions/src_api.ShareLinkResponse'
      size_bytes:
        type: integer
      tags:
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  src_api.FolderChildrenResponse:
    properties:
      files:
        items:
          $ref: '#/definitions/src_api.FolderFileResponse'
        type: array
      files_pagination:
        $ref: '#/definitions/src_api.FolderPaginationInfo'
      folders:
        items:
          $ref: '#/definitions/src_api.FolderResponse'
        type: array
    type: object
  src_api.FolderDetailsResponse:
    properties:
      breadcrumbs:
        items:
          $ref: '#/definitions/src_api.FolderResponse'
        type: array
      folder:
        $ref: '#/definitions/src_api.FolderResponse'
    type: object
  src_api.FolderFileResponse:
    properties:
      created_at:
        type: string
      download_count:
        type: integer
      folder_id:
        type: string
      id:
        type: string
      is_public:
        type: boolean
      mime_type:
        type: string
      original_filename:
        type: string
      size_bytes:
        type: integer
      tags:
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  src_api.FolderPaginationInfo:
    properties:
      has_more:
        type: boolean
      has_next:
        type: boolean
      has_previous:
        type: boolean
      page:
        type: integer
      page_size:
        type: integer
      total_files:
        type: integer
      total_folders:
        description: Additional fields for GraphQL compatibility
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  src_api.FolderResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      parent_id:
        type: string
      updated_at:
        type: string
    type: object
  src_api.FolderShareLinkResponse:
    properties:
      created_at:
        type: string
      download_count:
        type: integer
      id:
        type: string
      is_active:
        type: boolean
      token:
        type: string
    type: object
  src_api.FolderShareLinkStatusResponse:
    properties:
      has_share_link:
        type: boolean
      token:
        type: string
    type: object
  src_api.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  src_api.MoveFileRequest:
    properties:
      folder_id:
        type: string
    type: object
  src_api.PaginationInfo:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  src_api.PaginationMeta:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  src_api.PromoteUserRequest:
    properties:
      user_id:
        type: string
    type: object
  src_api.PublicFileInfo:
    properties:
      created_at:
        type: string
      download_url:
        type: string
      id:
        type: string
      mime_type:
        type: string
      original_filename:
        type: string
      size_bytes:
        type: integer
      tags:
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  src_api.PublicFileResponse:
    properties:
      created_at:
        type: string
      download_url:
        type: string
      folder_id:
        type: string
      id:
        type: string
      mime_type:
        type: string
      original_filename:
        type: string
      size_bytes:
        type: integer
      tags:
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  src_api.PublicFilesListResponse:
    properties:
      files:
        items:
          $ref: '#/definitions/src_api.PublicFileInfo'
        type: array
      pagination:
        $ref: '#/definitions/src_api.PaginationMeta'
    type: object
  src_api.PublicFolderInfo:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      parent_id:
        type: string
      updated_at:
        type: string
    type: object
  src_api.PublicFolderTreeResponse:
    properties:
      files:
        items:
          $ref: '#/definitions/src_api.PublicFileInfo'
        type: array
      folder:
        $ref: '#/definitions/src_api.PublicFolderInfo'
      subfolders:
        items:
          $ref: '#/definitions/src_api.PublicFolderTreeResponse'
        type: array
    type: object
  src_api.RegistrationEntry:
    properties:
      count:
        type: integer
      date:
        type: string
    type: object
  src_api.ShareLinkResponse:
    properties:
      created_at:
        type: string
      download_count:
        type: integer
      is_active:
        type: boolean
      token:
        type: string
    type: object
  src_api.SignupRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  src_api.StatsResponse:
    properties:
      files_by_type:
        additionalProperties:
          type: integer
        type: object
      quota_available_bytes:
        type: integer
      quota_bytes:
        type: integer
      quota_used_bytes:
        type: integer
      total_files:
        type: integer
      total_size_bytes:
        type: integer
      upload_history:
        items:
          $ref: '#/definitions/src_api.UploadHistoryEntry'
        type: array
    type: object
  src_api.TogglePublicRequest:
    properties:
      is_public:
        example: true
        type: boolean
    type: object
  src_api.TogglePublicResponse:
    properties:
      file:
        $ref: '#/definitions/src_api.FileResponse'
    type: object
  src_api.UpdateFolderRequest:
    properties:
      name:
        type: string
      parent_id:
        type: string
    type: object
  src_api.UpdatePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        type: string
    type: object
  src_api.UploadHistoryEntry:
    properties:
      count:
        type: integer
      date:
        type: string
      total_size:
        type: integer
    type: object
  src_api.UploadResponse:
    properties:
      file:
        $ref: '#/definitions/src_api.FileResponse'
      hash:
        type: string
      is_duplicate:
        type: boolean
    type: object
  src_api.UserResponseData:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      rate_limit_rps:
        type: integer
      role:
        $ref: '#/definitions/securevault-backend_src_models.UserRole'
      storage_quota_bytes:
        type: integer
    type: object
  src_api.UserStorageEntry:
    properties:
      file_count:
        type: integer
      quota_bytes:
        type: integer
      total_size_bytes:
        type: integer
      user_email:
        type: string
      user_id:
        type: string
    type: object
host: securevault-backend.onrender-1.com
info:
  contact:
    email: support@securevault.com
    name: API Support
    url: https://securevault-backend-1.onrender.com/support
  description: SecureVault is a secure file storage service with S3 integration, user
    authentication, file sharing, and administrative features.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://securevault-backend-1.onrender.com/terms/
  title: SecureVault API
  version: "1.0"
paths:
  /admin/files:
    get:
      consumes:
      - application/json
      description: Get a paginated list of all files in the system with admin-level
        details
      parameters:
      - description: Filter by specific user UUID
        in: query
        name: user_id
        type: string
      - description: Filter by user email (partial match)
        in: query
        name: user_email
        type: string
      - description: Filter files uploaded after date (YYYY-MM-DD)
        in: query
        name: uploaded_after
        type: string
      - description: Filter files uploaded before date (YYYY-MM-DD)
        in: query
        name: uploaded_before
        type: string
      - description: Sort field (filename, size, upload_date, user_email)
        in: query
        name: sort
        type: string
      - description: Sort order (asc, desc)
        in: query
        name: order
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (max 100)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of all files with admin details
          schema:
            $ref: '#/definitions/src_api.AdminFilesResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "403":
          description: Admin privileges required
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all files (Admin)
      tags:
      - Admin
  /admin/files/{id}:
    delete:
      consumes:
      - application/json
      description: Admin can delete any file regardless of ownership (includes S3
        cleanup)
      parameters:
      - description: File ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: File successfully deleted
        "400":
          description: Invalid file ID format
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "403":
          description: Admin privileges required
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "404":
          description: File not found
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete any file (Admin)
      tags:
      - Admin
  /admin/promote:
    post:
      consumes:
      - application/json
      description: Promote an existing user to admin role (admin only)
      parameters:
      - description: User ID to promote
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/src_api.PromoteUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User successfully promoted to admin
          schema:
            $ref: '#/definitions/src_api.UserResponseData'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "403":
          description: Forbidden - admin access required
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Promote user to admin
      tags:
      - Admin
  /admin/signup:
    post:
      consumes:
      - application/json
      description: Create a new admin user account with email and password
      parameters:
      - description: Admin registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/src_api.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Admin user successfully registered
          schema:
            $ref: '#/definitions/src_api.AuthResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "409":
          description: Email already exists
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
      summary: Register a new admin user
      tags:
      - Admin
  /admin/stats:
    get:
      consumes:
      - application/json
      description: Get comprehensive system-wide statistics including users, files,
        storage, and analytics
      parameters:
      - description: Start date for time-based data (YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: End date for time-based data (YYYY-MM-DD)
        in: query
        name: to
        type: string
      - description: Time grouping (day, week, month, year)
        in: query
        name: group_by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: System-wide statistics
          schema:
            $ref: '#/definitions/src_api.AdminStatsResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "403":
          description: Admin privileges required
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get system statistics (Admin)
      tags:
      - Admin
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password to get JWT token
      parameters:
      - description: User login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/src_api.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User successfully authenticated
          schema:
            $ref: '#/definitions/src_api.AuthResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
      summary: Authenticate user
      tags:
      - Authentication
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password
      parameters:
      - description: User registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/src_api.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User successfully registered
          schema:
            $ref: '#/definitions/src_api.AuthResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "409":
          description: Email already exists
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
      summary: Register a new user
      tags:
      - Authentication
  /files:
    get:
      consumes:
      - application/json
      description: Get a paginated list of files owned by the authenticated user with
        optional filtering
      parameters:
      - description: Filter by filename (partial match)
        in: query
        name: filename
        type: string
      - description: Filter by MIME type
        in: query
        name: mime_type
        type: string
      - description: Filter by comma-separated tags
        in: query
        name: tags
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of user files
          schema:
            $ref: '#/definitions/src_api.FileListResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List user files
      tags:
      - Files
    post:
      consumes:
      - multipart/form-data
      description: Upload a new file to secure storage with optional tags
      parameters:
      - description: File to upload (max 100MB)
        in: formData
        name: file
        required: true
        type: file
      - description: Comma-separated tags for the file
        in: formData
        name: tags
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: File successfully uploaded
          schema:
            $ref: '#/definitions/src_api.UploadResponse'
        "400":
          description: Invalid request or no file provided
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "413":
          description: File too large
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "500":
          description: Upload failed
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload a file
      tags:
      - Files
  /files/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a file owned by the authenticated user (includes S3 cleanup)
      parameters:
      - description: File ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: File successfully deleted
        "400":
          description: Invalid file ID format
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "404":
          description: File not found
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete file
      tags:
      - Files
    get:
      consumes:
      - application/json
      description: Get detailed information about a specific file including metadata
        and share link
      parameters:
      - description: File ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: File details
          schema:
            $ref: '#/definitions/src_api.FileResponse'
        "400":
          description: Invalid file ID format
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "404":
          description: File not found
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get file details
      tags:
      - Files
  /files/{id}/download:
    get:
      description: Download file content with proper headers and content disposition
      parameters:
      - description: File ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: File content with appropriate headers
          schema:
            type: file
        "400":
          description: Invalid file ID format
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "404":
          description: File not found
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "500":
          description: Download failed
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Download file
      tags:
      - Files
  /files/{id}/move:
    patch:
      consumes:
      - application/json
      description: Move a file to a different folder or root
      parameters:
      - description: File ID
        in: path
        name: id
        required: true
        type: string
      - description: Move file request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/src_api.MoveFileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: File moved successfully
          schema:
            $ref: '#/definitions/src_api.FileResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/src_api.ErrorResponse'
        "401":
          description: Authentication required
          schema:
