version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: securevault-db
    environment:
      POSTGRES_DB: securevault
      POSTGRES_USER: securevault
      POSTGRES_PASSWORD: securevault123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - securevault-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: securevault-backend
    environment:
      - DATABASE_URL=postgres://securevault:securevault123@postgres:5432/securevault?sslmode=disable
      - JWT_SECRET=your-jwt-secret-key-change-in-production
      - PORT=8080
      - AWS_S3_BUCKET=your-s3-bucket-name
      - AWS_S3_REGION=us-east-1
      # Add other environment variables as needed
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    volumes:
      - ./storage:/root/storage
    networks:
      - securevault-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  securevault-network:
    driver: bridge